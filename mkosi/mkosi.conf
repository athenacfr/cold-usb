[Distribution]
Distribution=debian
Release=bookworm
Architecture=x86-64

[Output]
ImageId=cold_usb
Format=disk
OutputDirectory=build
OutputExtension=img

[Build]
BuildSources=
  ../apps/desktop/build/stable-linux-x64:/electrobun-build

[Content]
Autologin=yes
Bootable=yes
Bootloader=grub
KernelCommandLine=rw #quiet loglevel=0
Packages=
  linux-image-amd64
  grub-efi-amd64
  systemd
  udev
  kmod
  # Electrobun runtime dependencies (GTK + WebKitGTK)
  libgtk-3-0
  libwebkit2gtk-4.1-0
  libayatana-appindicator3-1
  # Display server for kiosk mode
  cage
  seatd

[Validation]
Checksum=yes

[Runtime]
Console=gui