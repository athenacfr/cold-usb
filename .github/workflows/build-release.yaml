name: Build ISO

on:
  push:
    branches:
      - main

jobs:
  build-app:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev pkg-config

      - name: Install Packages
        run: bun install

      - name: Build Vite Frontend
        working-directory: apps/desktop
        run: bun run vite build

      - name: Build Electrobun App
        working-directory: apps/desktop
        run: bun run electrobun build --env=stable

      - name: Upload App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_usb_bundle
          path: apps/desktop/build/stable-linux-x64/

  build-img:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-app

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Mkosi
        uses: systemd/mkosi@v26

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install pefile
          sudo apt install -y mtools
          bun install

      - name: Download App Bundle Artifact
        uses: actions/download-artifact@v4
        with:
          name: cold_usb_bundle
          path: apps/desktop/build/stable-linux-x64/

      - name: Get Release Version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_VERSION=$(bunx semantic-release --dry-run 2>&1 | grep -oP "next release version is \K[0-9]+\.[0-9]+\.[0-9]+" || echo "")
          if [ -z "$NEXT_VERSION" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Build IMG
        if: steps.version.outputs.should_release == 'true'
        working-directory: mkosi
        run: sudo mkosi --image-version=${{ steps.version.outputs.version }}

      - name: Release
        if: steps.version.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release
